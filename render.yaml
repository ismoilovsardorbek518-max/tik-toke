services:
  - type: web
    name: tiktoke-erp
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/tiktoke-erp run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tiktoke-erp-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: tiktoke-erp-db
    plan: free
    region: frankfurt
