# Render.com deployment konfiguratsiyasi
# Batafsil: https://render.com/docs/blueprint-spec

services:
  # ─── 1. Backend: Express API ───────────────────────────────────────────────
  - type: web
    name: tiktoke-erp-api
    runtime: node
    region: frankfurt          # Markaziy Osiyo uchun eng yaqin region
    plan: free
    rootDir: .
    buildCommand: |
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/db exec tsc -b --force &&
      pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false            # Render dashboard'dan qo'lda kiritiladi (Neon URL)
      - key: SESSION_SECRET
        generateValue: true    # Render avtomatik kuchli random qiymat yaratadi
      - key: PORT
        value: 10000

  # ─── 2. Frontend: React/Vite static site ────────────────────────────────────
  - type: web
    name: tiktoke-erp-ui
    runtime: static
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: |
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      BASE_PATH=/ pnpm --filter @workspace/tiktoke-erp run build
    staticPublishPath: ./artifacts/tiktoke-erp/dist/public
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false              # Backend deploy bo'lgandan keyin qo'lda kiriting: https://tiktoke-erp-api.onrender.com
